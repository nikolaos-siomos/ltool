name: Python version CLI tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Upgrade pip tooling
        run: |
          python -m pip install --upgrade pip setuptools wheel

      - name: Install package
        run: |
          # If you have extras for runtime/test deps, use them (example: .[test])
          # Otherwise keep it simple:
          pip install -e .

      - name: Run version smoke test (executes your CLI test script)
        working-directory: examples
        run: |
          python test_ltool.py

      - name: Upload plots
        if : matrix.python-version == '3.13'
        uses: actions/upload-artifact@v4
        with:
          name: test-plots
          path: |
            examples/output/
            examples/output_single/
            examples/sample_files/output/
          if-no-files-found: ignore
